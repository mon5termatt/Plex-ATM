<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Plex ATM</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand brand-link" href="{{ url_for('shows.list_shows') }}">
      <img src="{{ url_for('static', filename='logo.svg') }}" alt="Plex ATM logo" class="brand-logo">
      <div class="brand-text">
        <h1>Plex ATM</h1>
        <small>Plex Anime Theme Manager</small>
      </div>
    </a>
    <nav>
      <a href="{{ url_for('shows.list_shows') }}">Shows</a>
      <a href="{{ url_for('settings.settings') }}">Settings</a>
    </nav>
  </header>
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="flash-list">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
